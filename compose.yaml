services:
  watchtower:
    build: .
    image: watchtower:local
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - watchtower-data:/data
    networks: [media]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  mount:
    image: rclone/rclone:1.69
    restart: unless-stopped
    depends_on:
      watchtower:
        condition: service_healthy
    command:
      - mount
      - ":webdav:"
      - /media
      - --webdav-url=http://watchtower:8080/dav/
      - --webdav-vendor=other
      - --allow-other
      - --allow-non-empty
      - --read-only
      - --vfs-cache-mode=off
      - --dir-cache-time=30s
      - --poll-interval=0
      - --log-level=INFO
    cap_add: [SYS_ADMIN]
    devices: [/dev/fuse:/dev/fuse]
    security_opt: [apparmor:unconfined]
    volumes:
      - type: bind
        source: ${MEDIA_MOUNT:-./mnt}
        target: /media
        bind:
          propagation: rshared
          create_host_path: true
    networks: [media]

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    profiles: [bundled]
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Etc/UTC}
    volumes:
      - seerr-data:/app/config
    ports: ["5055:5055"]
    networks: [media]

networks:
  media:

volumes:
  watchtower-data:
  seerr-data:
